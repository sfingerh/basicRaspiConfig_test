<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }

        body.dark-mode {
            background-color: #121212;
            color: #f4f4f9;
        }

        h1, h2 {
            margin: 5px;
            text-align: center;
        }

        input[type="number"], textarea, button {
            color: inherit;
            background-color: inherit;
            border: 1px solid #ccc;
        }

        img {
            max-width: 100%;
            max-height: 300px;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .messages-container {
            width: 200%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 10px;
            resize: none;
            border-radius: 5px;
            padding: 5px;
            font-family: monospace;
            box-sizing: border-box;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .red-button {
            background-color: #FF4C4C;
        }

        .top-right {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
        }

        .footer img {
            max-width: 100px;
            display: block;
            margin: 5px auto;
        }

        @media (max-width: 600px) {
            .messages-container {
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <button class="top-right" onclick="toggleDarkMode()">Modo Nocturno</button>
    <h1>SQC: LabSens</h1>

    <div>
        {% if photo_name %}
            <img src="/photos/{{ photo_name }}" alt="Última Foto" id="photo">
        {% else %}
            <p>No hay fotos disponibles.</p>
        {% endif %}
    </div>

    <div class="messages-container">
        <h2>Mensajes</h2>
        <textarea id="console" readonly></textarea>
    </div>

    <div>
        <label for="timeInput">Tiempo Auto[min]</label>
        <input type="number" id="timeInput" min="1" max="1000" value="5">

        <label for="exposureTime">Tiempo Exposición[s]</label>
        <input type="number" id="exposureTime" min="1" max="1000" value="10">

        <label for="nightMode">Solo Noche</label>
        <input type="checkbox" id="nightMode">

        <button onclick="sendActionWithTime('Button 1', document.getElementById('timeInput').value, document.getElementById('exposureTime').value, document.getElementById('nightMode').checked)">Foto</button>
        <button onclick="sendActionWithTime('Button 2', document.getElementById('timeInput').value, document.getElementById('exposureTime').value, document.getElementById('nightMode').checked)">Iniciar</button>
        <button onclick="sendAction('Button 3')">Detener</button>
    </div>

    <div>
        <button class="red-button" onclick="sendAction('Shutdown')">Apagar</button>
        <button class="red-button" onclick="sendAction('Reboot')">Reiniciar</button>
    </div>

    <div class="footer">
        <img src="/static/logo.png" alt="Logo LabSens">
        <p>Desarrollado por Drengifo para LabSens - 2026</p>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function sendAction(button) {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ button: button })
            })
            .then(response => response.json())
            .then(data => {
                const consoleElement = document.getElementById('console');
                if (data.message) {
                    consoleElement.value += data.message + '\n';
                    consoleElement.scrollTop = consoleElement.scrollHeight;
                }
            })
            .catch(error => console.error('Error:', error));
        }

        function sendActionWithTime(button, time, exposureTime, nightMode) {
            const data = { button, time, exposureTime, nightMode };
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(data => {
                const consoleElement = document.getElementById('console');
                if (data.message) {
                    consoleElement.value += data.message + '\n';
                    consoleElement.scrollTop = consoleElement.scrollHeight;
                }
            })
            .catch(error => console.error('Error:', error));
        }

        function receiveMessage() {
            fetch('/send_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            })
            .then(response => response.json())
            .then(data => {
                const consoleElement = document.getElementById('console');
                if (data.message) {
                    consoleElement.value += data.message + '\n';
                    consoleElement.scrollTop = consoleElement.scrollHeight;
                }
            })
            .catch(error => console.error('Error al recibir el mensaje:', error));
        }

        setInterval(receiveMessage, 3000);
    </script>
</body>
</html>
